name: Auto-update open PRs when main changes

on:
  push:
    branches:
      - main

jobs:
  update-prs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Update open PRs that are behind main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prs=$(gh pr list --repo ${{ github.repository }} --state open --json number,mergeable,headRefName --jq '.[] | select(.mergeable == "MERGEABLE") | .number')
          for pr in $prs; do
            echo "Updating PR #$pr..."
            gh pr update-branch $pr --repo ${{ github.repository }} || echo "PR #$pr skipped (up to date or conflict)"
          done
