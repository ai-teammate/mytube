name: Provision GCS Buckets

# Manual trigger only — requires write access to the repository.
# Provisions mytube-raw-uploads and mytube-hls-output GCS buckets,
# grants IAM for the transcoder SA and CI SA, and optionally sets
# CDN_BASE_URL as a GitHub variable for the test suite.
on:
  workflow_dispatch:

permissions:
  contents: read   # checkout only; no write to repo contents

jobs:
  provision:
    runs-on: ubuntu-latest

    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION:     ${{ vars.GCP_REGION }}
      RAW_BUCKET: mytube-raw-uploads
      HLS_BUCKET: mytube-hls-output
      TRANSCODER_SA: mytube-transcoder
      API_SERVICE: mytube-api
      CI_SA: ai-teammate-gcloud

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── 1. Create raw-uploads bucket (private) ───────────────────────────────
      - name: Create raw-uploads bucket (private)
        run: |
          if gcloud storage buckets describe "gs://${{ env.RAW_BUCKET }}" \
              --project="${{ env.PROJECT_ID }}" &>/dev/null; then
            echo "gs://${{ env.RAW_BUCKET }} already exists — enforcing public-access-prevention..."
            gcloud storage buckets update "gs://${{ env.RAW_BUCKET }}" \
              --public-access-prevention \
              --project="${{ env.PROJECT_ID }}"
          else
            gcloud storage buckets create "gs://${{ env.RAW_BUCKET }}" \
              --location="${{ env.REGION }}" \
              --uniform-bucket-level-access \
              --public-access-prevention \
              --project="${{ env.PROJECT_ID }}"
            echo "Created gs://${{ env.RAW_BUCKET }}"
          fi

      # ── Verify PAP on raw-uploads bucket ────────────────────────────────────
      - name: Verify PAP on raw-uploads bucket
        run: |
          PAP=$(gcloud storage buckets describe "gs://${{ env.RAW_BUCKET }}" \
            --project="${{ env.PROJECT_ID }}" \
            --format="value(public_access_prevention)")
          echo "publicAccessPrevention = ${PAP}"
          [ "${PAP}" = "enforced" ] || { echo "ERROR: expected enforced, got ${PAP}" >&2; exit 1; }

      # ── 2. Create HLS-output bucket (public read for CDN delivery) ───────────
      - name: Create hls-output bucket (public read)
        run: |
          if gcloud storage buckets describe "gs://${{ env.HLS_BUCKET }}" \
              --project="${{ env.PROJECT_ID }}" &>/dev/null; then
            echo "gs://${{ env.HLS_BUCKET }} already exists — skipping."
          else
            gcloud storage buckets create "gs://${{ env.HLS_BUCKET }}" \
              --location="${{ env.REGION }}" \
              --uniform-bucket-level-access \
              --no-public-access-prevention \
              --project="${{ env.PROJECT_ID }}"

            gcloud storage buckets add-iam-policy-binding "gs://${{ env.HLS_BUCKET }}" \
              --member="allUsers" \
              --role="roles/storage.objectViewer" \
              --project="${{ env.PROJECT_ID }}"

            echo "Created gs://${{ env.HLS_BUCKET }} with allUsers objectViewer"
          fi

      # ── 3. Create transcoder service account (if absent) ────────────────────
      - name: Create transcoder service account
        run: |
          SA_EMAIL="${{ env.TRANSCODER_SA }}@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          if gcloud iam service-accounts describe "${SA_EMAIL}" \
              --project="${{ env.PROJECT_ID }}" &>/dev/null; then
            echo "${SA_EMAIL} already exists — skipping."
          else
            gcloud iam service-accounts create "${{ env.TRANSCODER_SA }}" \
              --display-name="mytube Transcoder" \
              --description="Least-privilege SA for the mytube-transcoder Cloud Run Job" \
              --project="${{ env.PROJECT_ID }}"
            echo "Created ${SA_EMAIL}"
          fi

      # ── 4. Grant bucket IAM to transcoder SA ────────────────────────────────
      - name: Grant transcoder SA objectUser on raw-uploads
        run: |
          SA_EMAIL="${{ env.TRANSCODER_SA }}@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          gcloud storage buckets add-iam-policy-binding "gs://${{ env.RAW_BUCKET }}" \
            --member="serviceAccount:${SA_EMAIL}" \
            --role="roles/storage.objectUser" \
            --project="${{ env.PROJECT_ID }}"

      - name: Grant transcoder SA objectUser on hls-output
        run: |
          SA_EMAIL="${{ env.TRANSCODER_SA }}@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          gcloud storage buckets add-iam-policy-binding "gs://${{ env.HLS_BUCKET }}" \
            --member="serviceAccount:${SA_EMAIL}" \
            --role="roles/storage.objectUser" \
            --project="${{ env.PROJECT_ID }}"

      # ── 5a. Get API server SA and grant bucket IAM ──────────────────────────
      - name: Get API server service account email
        id: get_api_sa
        run: |
          API_SA_EMAIL=$(gcloud run services describe "${{ env.API_SERVICE }}" \
            --region="${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}" \
            --format="value(spec.template.spec.serviceAccountName)" 2>/dev/null || true)
          if [ -z "${API_SA_EMAIL}" ]; then
            # Service not deployed yet — derive from default Compute SA (project number)
            PROJECT_NUMBER=$(gcloud projects describe "${{ env.PROJECT_ID }}" \
              --format="value(projectNumber)")
            API_SA_EMAIL="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
          elif [[ "${API_SA_EMAIL}" != *"@"* ]]; then
            API_SA_EMAIL="${API_SA_EMAIL}@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          fi
          echo "api_sa_email=${API_SA_EMAIL}" >> "$GITHUB_OUTPUT"
          echo "API SA: ${API_SA_EMAIL}"

      - name: Grant API server SA objectUser on raw-uploads
        run: |
          API_SA_EMAIL="${{ steps.get_api_sa.outputs.api_sa_email }}"
          gcloud storage buckets add-iam-policy-binding "gs://${{ env.RAW_BUCKET }}" \
            --member="serviceAccount:${API_SA_EMAIL}" \
            --role="roles/storage.objectUser" \
            --project="${{ env.PROJECT_ID }}"

      - name: Grant API server SA objectUser on hls-output
        run: |
          API_SA_EMAIL="${{ steps.get_api_sa.outputs.api_sa_email }}"
          gcloud storage buckets add-iam-policy-binding "gs://${{ env.HLS_BUCKET }}" \
            --member="serviceAccount:${API_SA_EMAIL}" \
            --role="roles/storage.objectUser" \
            --project="${{ env.PROJECT_ID }}"

      # ── 5. Grant CI SA legacyBucketReader for test access ───────────────────
      - name: Grant CI SA legacyBucketReader on raw-uploads
        run: |
          CI_SA_EMAIL="${{ env.CI_SA }}@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          gcloud storage buckets add-iam-policy-binding "gs://${{ env.RAW_BUCKET }}" \
            --member="serviceAccount:${CI_SA_EMAIL}" \
            --role="roles/storage.legacyBucketReader" \
            --project="${{ env.PROJECT_ID }}"

      - name: Grant CI SA objectViewer on raw-uploads (test fixture downloads)
        run: |
          CI_SA_EMAIL="${{ env.CI_SA }}@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          gcloud storage buckets add-iam-policy-binding "gs://${{ env.RAW_BUCKET }}" \
            --member="serviceAccount:${CI_SA_EMAIL}" \
            --role="roles/storage.objectViewer" \
            --project="${{ env.PROJECT_ID }}"

      - name: Grant CI SA objectCreator on raw-uploads (test fixture uploads)
        run: |
          CI_SA_EMAIL="${{ env.CI_SA }}@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          gcloud storage buckets add-iam-policy-binding "gs://${{ env.RAW_BUCKET }}" \
            --member="serviceAccount:${CI_SA_EMAIL}" \
            --role="roles/storage.objectCreator" \
            --project="${{ env.PROJECT_ID }}"

      - name: Grant CI SA legacyBucketReader on hls-output
        run: |
          CI_SA_EMAIL="${{ env.CI_SA }}@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          gcloud storage buckets add-iam-policy-binding "gs://${{ env.HLS_BUCKET }}" \
            --member="serviceAccount:${CI_SA_EMAIL}" \
            --role="roles/storage.legacyBucketReader" \
            --project="${{ env.PROJECT_ID }}"

      # ── 6. Grant CI SA roles/eventarc.viewer (read-only inspect for tests) ──
      - name: Grant CI SA roles/eventarc.viewer
        run: |
          CI_SA_EMAIL="${{ env.CI_SA }}@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          gcloud projects add-iam-policy-binding "${{ env.PROJECT_ID }}" \
            --member="serviceAccount:${CI_SA_EMAIL}" \
            --role="roles/eventarc.viewer" \
            --condition=None

      # ── 7. Summary ───────────────────────────────────────────────────────────
      - name: Print summary
        run: |
          echo "## GCS Bucket Provisioning Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bucket | Access |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| gs://${{ env.RAW_BUCKET }} | private (transcoder SA objectUser; API SA objectUser; CI SA read+download+create) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| gs://${{ env.HLS_BUCKET }} | allUsers objectViewer (CDN delivery); transcoder SA objectUser; API SA objectUser |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "MYTUBE-79 / MYTUBE-49 / MYTUBE-127 / MYTUBE-318 / MYTUBE-387 tests should now pass." >> "$GITHUB_STEP_SUMMARY"
