name: SM Agent

run-name: "SM Agent : ${{ github.event_name == 'schedule' && 'scheduled' || 'manual' }}"

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  sm-agent:
    runs-on: ubuntu-latest
    concurrency:
      group: sm-agent
      cancel-in-progress: false

    steps:
      - name: 📋 Job Info
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🤖 SM Agent Started"
          echo "⏰ Trigger: ${{ github.event_name }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PAT_TOKEN }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_AI_TEAMMATE_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Cache JDK 23
        uses: actions/cache@v4
        with:
          path: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/
          key: jdk-temurin-23-linux

      - name: Setup Java Environment
        uses: ./.github/actions/setup-java-only
        with:
          cache-key-suffix: '-sm'

      - name: Cache DMTools CLI
        id: cache-dmtools
        uses: actions/cache@v4
        with:
          path: ~/.dmtools
          key: dmtools-v1.7.156

      - name: Install DMTools CLI
        if: steps.cache-dmtools.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://raw.githubusercontent.com/IstiN/dmtools/v1.7.156/install.sh | bash -s v1.7.156

      - name: Add DMTools to PATH
        run: echo "$HOME/.dmtools/bin" >> $GITHUB_PATH

      - name: Configure Git Author
        run: |
          git config --global user.name "AI Teammate"
          git config --global user.email "agent.ai.native@gmail.com"

      - name: Run SM Agent
        env:
          # Jira Configuration
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BASE_PATH: ${{ vars.JIRA_BASE_PATH }}
          JIRA_AUTH_TYPE: ${{ vars.JIRA_AUTH_TYPE }}
          JIRA_TRANSFORM_CUSTOM_FIELDS_TO_NAMES: ${{ vars.JIRA_TRANSFORM_CUSTOM_FIELDS_TO_NAMES }}
          JIRA_CLEAR_CACHE: "true"

          # DMTools Integration Settings
          DMTOOLS_INTEGRATIONS: "jira,github,file"

          # AI Service Configuration
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GEMINI_DEFAULT_MODEL: ${{ vars.GEMINI_DEFAULT_MODEL }}
          DEFAULT_LLM: "gemini"
          DEFAULT_TRACKER: "jira"

          # GitHub Authentication
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          SOURCE_GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          CLI_ALLOWED_COMMANDS: "find,ls,cat,mkdir,bash,run-agent.sh"
          DMTOOLS_FILE_READ_ALLOWED_PATHS: "../.dmtools/**"
        run: |
          CI_RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "CI Run URL: ${CI_RUN_URL}"
          dmtools run agents/sm.json --ciRunUrl "${CI_RUN_URL}"
