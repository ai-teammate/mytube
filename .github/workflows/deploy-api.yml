name: Deploy API

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - '.github/workflows/deploy-api.yml'

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  SERVICE: mytube-api
  IMAGE: gcr.io/${{ vars.GCP_PROJECT_ID }}/mytube-api
  TRANSCODER_JOB: mytube-transcoder
  TRANSCODER_IMAGE: gcr.io/${{ vars.GCP_PROJECT_ID }}/mytube-transcoder

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build and push API image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} ./api
          docker push ${{ env.IMAGE }}:${{ github.sha }}

      - name: Build and push Transcoder image
        run: |
          docker build -t ${{ env.TRANSCODER_IMAGE }}:${{ github.sha }} -f ./api/cmd/transcoder/Dockerfile ./api
          docker push ${{ env.TRANSCODER_IMAGE }}:${{ github.sha }}

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --max-instances 2 \
            --add-cloudsql-instances ${{ vars.CLOUD_SQL_CONNECTION_NAME }} \
            --set-env-vars "DB_NAME=${{ vars.DB_NAME }},INSTANCE_UNIX_SOCKET=/cloudsql/${{ vars.CLOUD_SQL_CONNECTION_NAME }},FIREBASE_PROJECT_ID=${{ vars.FIREBASE_PROJECT_ID }},RAW_UPLOADS_BUCKET=${{ vars.RAW_UPLOADS_BUCKET }},CDN_BASE_URL=${{ vars.CDN_BASE_URL }}" \
            --set-secrets "DB_USER=${{ vars.GCP_DB_USER_SECRET }}:latest,DB_PASSWORD=${{ vars.GCP_DB_PASSWORD_SECRET }}:latest" \
            --project ${{ env.PROJECT_ID }}

      - name: Deploy Transcoder Cloud Run Job
        run: |
          gcloud run jobs update ${{ env.TRANSCODER_JOB }} \
            --image ${{ env.TRANSCODER_IMAGE }}:${{ github.sha }} \
            --update-env-vars "CDN_BASE_URL=${{ vars.CDN_BASE_URL }}" \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }}

      - name: Show service URL
        run: |
          gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --format "value(status.url)" \
            --project ${{ env.PROJECT_ID }}

      - name: Delete old revisions (keep last 2 for rollback)
        run: |
          SERVICE_NAME="${{ env.SERVICE }}"
          REGION="${{ env.REGION }}"
          PROJECT="${{ env.PROJECT_ID }}"

          REVISIONS=$(gcloud run revisions list \
            --service $SERVICE_NAME \
            --region $REGION \
            --project $PROJECT \
            --format="value(name)" \
            --sort-by="~metadata.creationTimestamp" \
            --limit=999)

          KEEP_COUNT=2
          TOTAL=$(echo "$REVISIONS" | grep -v '^$' | wc -l | tr -d ' ')

          if [ "$TOTAL" -le "$KEEP_COUNT" ]; then
            echo "✅ No cleanup needed ($TOTAL revisions)"
          else
            echo "🗑️  Deleting old revisions (keeping last $KEEP_COUNT)..."
            COUNT=0
            for REVISION in $REVISIONS; do
              COUNT=$((COUNT + 1))
              if [ "$COUNT" -gt "$KEEP_COUNT" ]; then
                gcloud run revisions delete $REVISION --region $REGION --project $PROJECT --quiet || true
              fi
            done
            echo "✅ Cleanup complete"
          fi

      - name: Cleanup old Docker images (keep last 3 for rollback)
        run: |
          PROJECT_ID="${{ env.PROJECT_ID }}"
          KEEP_COUNT=3

          for IMAGE_PATH in ${{ env.IMAGE }} ${{ env.TRANSCODER_IMAGE }}; do
            echo "--- Cleaning up: $IMAGE_PATH ---"

            # NOTE: do NOT pipe to "sort -u" — it breaks timestamp order
            ALL_IMAGES=$(gcloud container images list-tags "$IMAGE_PATH" \
              --project="$PROJECT_ID" \
              --format="json" \
              --sort-by=~timestamp 2>/dev/null | jq -r '[.[].digest] | unique_by(.) | .[]') || true

            if [ -z "$ALL_IMAGES" ]; then
              echo "✅ No images found, skipping"
              continue
            fi

            TOTAL=$(echo "$ALL_IMAGES" | grep -v '^$' | wc -l | tr -d ' ')

            if [ "$TOTAL" -le "$KEEP_COUNT" ]; then
              echo "✅ No cleanup needed ($TOTAL images)"
              continue
            fi

            DELETED=0; FAILED=0; COUNT=0
            while IFS= read -r IMAGE_DIGEST; do
              [ -z "$IMAGE_DIGEST" ] && continue
              COUNT=$((COUNT + 1))
              if [ "$COUNT" -gt "$KEEP_COUNT" ]; then
                if gcloud container images delete "${IMAGE_PATH}@${IMAGE_DIGEST}" \
                    --project="$PROJECT_ID" --quiet --force-delete-tags 2>/dev/null; then
                  DELETED=$((DELETED + 1))
                else
                  FAILED=$((FAILED + 1))
                  echo "⚠️  Failed (may be in use): $IMAGE_DIGEST"
                fi
              fi
            done <<< "$ALL_IMAGES"

            echo "✅ Cleanup complete: deleted $DELETED, failed $FAILED"
          done

      - name: Cleanup old Secret Manager versions
        run: |
          PROJECT_ID="${{ env.PROJECT_ID }}"
          for SECRET_NAME in mytube-db-password mytube-db-user; do
            OLD_VERSIONS=$(gcloud secrets versions list $SECRET_NAME --project=$PROJECT_ID \
              --filter="state=ENABLED" --sort-by="~name" --format="value(name)" | tail -n +2)
            if [ -n "$OLD_VERSIONS" ]; then
              echo "$OLD_VERSIONS" | xargs -r -P 5 -I {} \
                gcloud secrets versions destroy {} --secret=$SECRET_NAME --project=$PROJECT_ID --quiet || true
            fi
          done
